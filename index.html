<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Consola de Inteligencia en Repuestos</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #0f172a; color: #f8fafc; padding: 40px; margin: 0; }
        .wrapper { max-width: 900px; margin: 0 auto; }
        .panel { background: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #334155; }
        h1 { text-align: center; color: #38bdf8; margin-bottom: 30px; font-size: 24px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; font-weight: 600; }
        input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #475569; border-radius: 6px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #0284c7; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #0369a1; }
        .loading { display: none; text-align: center; color: #38bdf8; margin: 20px 0; font-weight: bold; }
        .card-result { display: none; background: #0f172a; padding: 25px; border-radius: 8px; margin-top: 30px; border-left: 5px solid #38bdf8; }
        .badge { background: #1e293b; padding: 5px 10px; border-radius: 4px; font-size: 12px; color: #38bdf8; border: 1px solid #38bdf8; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #1e293b; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: #38bdf8; background-color: #111827; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="panel">
        <h1>Análisis Cruzado de Números de Parte</h1>
        <div class="grid-inputs">
            <div><label>Marca</label><input type="text" id="marca" placeholder="Ej. Toyota"></div>
            <div><label>Modelo</label><input type="text" id="modelo" placeholder="Ej. Corolla"></div>
            <div><label>Año</label><input type="number" id="anio" placeholder="Ej. 2012"></div>
            <div><label>Pieza (Descripción)</label><input type="text" id="pieza" placeholder="Ej. Pastillas"></div>
            <div style="grid-column: span 2;"><label>Número de Parte</label><input type="text" id="numero_parte" placeholder="Ej. 04465-06100"></div>
        </div>
        
        <button onclick="ejecutarAnalisis()">Consultar Sistema</button>
        <button onclick="descargarCatálogoCSV()" style="background: #10b981; margin-top: 10px;">Generar y Descargar Catálogo CSV</button>
        
        <div class="loading" id="loader">Orquestando datos... Por favor espera.</div>
        
        <div class="card-result" id="resultado">
            <h2>OEM Detectado: <span id="oem-val" style="color:#f43f5e"></span> <span class="badge" id="origen-val"></span></h2>
            <p><strong>Descripción:</strong> <span id="desc-val"></span></p>
            <p><strong>Costo:</strong> $<span id="precio-val"></span></p>
            <p><strong>Disponibilidad:</strong> <span id="stock-val"></span></p>
            <h3 style="margin-top:25px; color:#38bdf8;">Vehículos Compatibles:</h3>
            <table>
                <thead><tr><th>Marca</th><th>Modelo</th><th>Desde</th><th>Hasta</th></tr></thead>
                <tbody id="tabla-cuerpo"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    async function ejecutarAnalisis() {
        // Obtener valores
        const marca = document.getElementById('marca').value;
        const modelo = document.getElementById('modelo').value;
        const anio = document.getElementById('anio').value;
        const pieza = document.getElementById('pieza').value;
        const nParte = document.getElementById('numero_parte').value;

        // Validar: Al menos debe haber Marca o Número de Parte
        if(!marca && !nParte) { 
            alert("Por favor, ingresa al menos una Marca o un Número de Parte para buscar."); 
            return; 
        }

        document.getElementById('loader').style.display = 'block'; 
        document.getElementById('resultado').style.display = 'none';

        // Construcción dinámica de la URL
        let queryParams = new URLSearchParams();
        if(marca) queryParams.append('marca', marca);
        if(modelo) queryParams.append('modelo', modelo);
        if(anio) queryParams.append('anio', anio);
        if(pieza) queryParams.append('pieza', pieza);
        if(nParte) queryParams.append('numero_parte', nParte);

        try {
            const res = await fetch(`http://localhost:8000/consultar?${queryParams.toString()}`);
            const data = await res.json();
            
            document.getElementById('loader').style.display = 'none'; 
            document.getElementById('resultado').style.display = 'block';

            // Actualizar interfaz
            document.getElementById('oem-val').innerText = data.oem || "N/A"; 
            document.getElementById('origen-val').innerText = data.origen || "N/A";
            document.getElementById('desc-val').innerText = data.descripcion || "No disponible"; 
            document.getElementById('precio-val').innerText = data.precio || "0.00";
            document.getElementById('stock-val').innerText = data.disponibilidad || "N/A";

            const tbody = document.getElementById('tabla-cuerpo'); 
            tbody.innerHTML = "";
            if(data.compatibilidades && data.compatibilidades.length > 0) {
                data.compatibilidades.forEach(c => {
                    tbody.innerHTML += `<tr><td>${c.marca}</td><td>${c.modelo}</td><td>${c.desde || '-'}</td><td>${c.hasta || 'Actual'}</td></tr>`;
                });
            } else {
                tbody.innerHTML = "<tr><td colspan='4'>No se encontraron vehículos compatibles.</td></tr>";
            }
        } catch (error) {
            document.getElementById('loader').style.display = 'none'; 
            alert("Error al conectar con el backend. Verifica que el servidor esté encendido.");
        }
    }

    function descargarCatálogoCSV() {
        window.location.href = "http://localhost:8000/exportar_csv";
    }
</script>
</body>
</html>
